version: '3.8'

services:
  # ─── Databases ───────────────────────────────────────
  postgres-citizen:
    image: postgres:15-alpine
    container_name: postgres-citizen
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: citizen_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d citizen_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-sensor:
    image: postgres:15-alpine
    container_name: postgres-sensor
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: sensor_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sensor_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Kafka Infrastructure ───────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─── Kafka UI ────────────────────────────────────────
  akhq:
    image: tchiotludo/akhq:0.24.0
    container_name: akhq
    ports:
      - "8085:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            docker-kafka:
              properties:
                bootstrap.servers: "kafka:29092"
    depends_on:
      - kafka

  # ─── Distributed Tracing ─────────────────────────────
  zipkin:
    image: openzipkin/zipkin:2.24
    container_name: zipkin
    ports:
      - "9411:9411"

  # ─── Config Server ──────────────────────────────────
  config-server:
    build:
      context: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/app/config-repo
    environment:
      CONFIG_REPO_PATH: "file:/app/config-repo"
      ZIPKIN_URL: "http://zipkin:9411/api/v2/spans"
    depends_on:
      - zipkin
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Eureka Server ──────────────────────────────────
  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      CONFIG_SERVER_URL: "http://config-server:8888"
      ZIPKIN_URL: "http://zipkin:9411/api/v2/spans"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── API Gateway ────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      CONFIG_SERVER_URL: "http://config-server:8888"
      EUREKA_SERVER_URL: "http://eureka-server:8761/eureka/"
      ZIPKIN_URL: "http://zipkin:9411/api/v2/spans"
    depends_on:
      eureka-server:
        condition: service_healthy

  # ─── Citizen Service ────────────────────────────────
  citizen-service:
    build:
      context: ./citizen-service
    container_name: citizen-service
    ports:
      - "8081:8081"
    environment:
      CONFIG_SERVER_URL: "http://config-server:8888"
      EUREKA_SERVER_URL: "http://eureka-server:8761/eureka/"
      DB_HOST: postgres-citizen
      DB_PORT: "5432"
      DB_NAME: citizen_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      ZIPKIN_URL: "http://zipkin:9411/api/v2/spans"
    depends_on:
      postgres-citizen:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ─── Sensor Service ─────────────────────────────────
  sensor-service:
    build:
      context: ./sensor-service
    container_name: sensor-service
    ports:
      - "8082:8082"
    environment:
      CONFIG_SERVER_URL: "http://config-server:8888"
      EUREKA_SERVER_URL: "http://eureka-server:8761/eureka/"
      DB_HOST: postgres-sensor
      DB_PORT: "5432"
      DB_NAME: sensor_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      ZIPKIN_URL: "http://zipkin:9411/api/v2/spans"
    depends_on:
      postgres-sensor:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  # ─── Notification Service ───────────────────────────
  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    ports:
      - "8083:8083"
    environment:
      CONFIG_SERVER_URL: "http://config-server:8888"
      EUREKA_SERVER_URL: "http://eureka-server:8761/eureka/"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      ZIPKIN_URL: "http://zipkin:9411/api/v2/spans"
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
